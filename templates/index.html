<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Stack System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <div class="header">
        <h2>Student Stack System</h2>
    </div>

    <!-- Form to add a student -->
    <form action="/push" method="POST">
        <div class="form-group">
            <label for="name">Student Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter student name">
        </div>

        <div class="form-group">
            <label for="marks">Marks (comma separated)</label>
            <input type="text" id="marks" name="marks" placeholder="e.g., 70, 80, 90" required>
        </div>

        <button type="submit" class="btn btn-primary">Add Student (Push)</button>
    </form>

    <div class="actions">
        <!-- button to pop student -->
        <a href="/pop" style="flex: 1; text-decoration: none;">
            <button class="btn btn-danger">Remove Last Student (Pop)</button>
        </a>
    </div>

    <div class="divider"></div>

    <div class="stack-section">
        <h3>Stack Contents</h3>

        {% if students %}
            <ul class="stack-list">
                <!-- loop through students in stack (reversed so top of stack is first) -->
                {% for student in students|reverse %}
                <li class="stack-item">
                    <div class="student-info">
                        <span class="student-name">{{student.name}}</span>
                        <span class="student-marks">Marks: {{student.marks|join(', ')}}</span>
                    </div>
                    <div class="student-average">
                        Avg: {{student.average|round(1)}}
                    </div>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <div class="empty-stack">
                The stack is currently empty.
            </div>
        {% endif %}
    </div>
</div>

</body>
</html>
